name: Publish to ConjureOS App Store

# Builds Conjure Finance to a single self-contained HTML file and publishes a
# new App Store version via the shared composite action in the conjureos repo.
#
# Two Supabase projects (Phase 24 split), selected by trigger:
#   - workflow_dispatch  -> DEV  project (test against dev.conjureos.pages.dev)
#   - release published  -> PROD project (ships to real users)
#
# Secrets to add per repo: the bot password (dev + prod) AND CONJUREOS_REPO_TOKEN
# (a fine-grained PAT, Contents:Read on ConjureOS). The URLs derive from the
# SUPABASE_DEV/PROD_PROJECT_REF secrets; anon key + bot email are public.
#
# Why we check ConjureOS out instead of `uses: Jonny-B/ConjureOS/...@dev`:
# cross-repo PRIVATE action sharing is an org-only GitHub feature, so the direct
# reference fails from a private personal repo with "Unable to resolve action ...
# not found". We instead clone ConjureOS with a read-only PAT and run the action
# by local path. See ANCHOR_APP_CI_SETUP.md §5 in the conjureos repo.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      changelog:
        description: Changelog for this version
        required: false
        default: ""

concurrency:
  group: publish-store-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app source
        uses: actions/checkout@v4

      # The composite action + bundler scripts live in the private ConjureOS
      # repo; clone it locally so we can run the action by path. The action
      # resolves its scripts via github.action_path/../../../scripts, which
      # lands in this checkout's scripts/ dir.
      - name: Checkout ConjureOS (composite action + scripts)
        uses: actions/checkout@v4
        with:
          repository: Jonny-B/ConjureOS
          ref: dev
          token: ${{ secrets.CONJUREOS_REPO_TOKEN }}
          path: .conjureos

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build single-file HTML
        run: npm run build:inline

      - name: Resolve changelog
        id: changelog
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            text="${{ github.event.release.body }}"
            [ -z "$text" ] && text="${{ github.event.release.name }}"
            [ -z "$text" ] && text="${{ github.event.release.tag_name }}"
          else
            text="${{ github.event.inputs.changelog }}"
          fi
          {
            echo "text<<__CHANGELOG__"
            echo "$text"
            echo "__CHANGELOG__"
          } >> "$GITHUB_OUTPUT"

      # workflow_dispatch -> DEV project. Test path; publishes to dev users.
      - name: Publish to App Store (dev)
        if: github.event_name == 'workflow_dispatch'
        uses: ./.conjureos/.github/actions/publish-anchor-app
        with:
          supabase-url: https://${{ secrets.SUPABASE_DEV_PROJECT_REF }}.supabase.co
          # Anon key is public by design (shipped in every browser); RLS applies.
          supabase-anon-key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZqbHN5d3JwdGVmZ3d1enRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTA3OTMsImV4cCI6MjA5NTQ4Njc5M30.ITZjX5KkMNgbJuFEHS5-IqFFJC6A39OynVgOznZeqD8
          bot-email: conjureosbot@gmail.com
          bot-password: ${{ secrets.PUBLISH_BOT_DEV_PASSWORD }}
          html-path: dist/index.html
          slug: finance
          changelog: ${{ steps.changelog.outputs.text }}

      # release published -> PROD project. Ships to real users.
      - name: Publish to App Store (prod)
        if: github.event_name == 'release'
        uses: ./.conjureos/.github/actions/publish-anchor-app
        with:
          supabase-url: https://${{ secrets.SUPABASE_PROD_PROJECT_REF }}.supabase.co
          supabase-anon-key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50Z2VsYnRlcGVjcXNxbG94bWN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTkzMzEsImV4cCI6MjA5MzY3NTMzMX0.fgRCszkeAbHANaK-JJAGmTwWHyOh-3b6-od1c3s3V0w
          bot-email: conjureosbot@gmail.com
          bot-password: ${{ secrets.PUBLISH_BOT_PROD_PASSWORD }}
          html-path: dist/index.html
          slug: finance
          changelog: ${{ steps.changelog.outputs.text }}
